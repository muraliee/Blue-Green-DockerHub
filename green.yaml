kind: Deployment
apiVersion: apps/v1
metadata:
  name: nodejs-app-green
  namespace: default
  labels:
    app: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
      version: green
  template:
    metadata:
      labels:
        app: nodejs-app
        version: green
    spec:
      containers:
      - name: nodejs-app
        image: "mohanck/practice-images:latest"
        ports:
          - containerPort: 3000